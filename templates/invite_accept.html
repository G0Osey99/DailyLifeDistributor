<!doctype html>
<html><head><meta charset="utf-8"><title>Accept invitation</title></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width:480px; margin:40px auto;">
{% if error %}
  <h2>Invitation problem</h2>
  <p style="color:#a00;">{{ error }}</p>
  <p><a href="{{ url_for('auth.login') }}">Go to login</a></p>
{% else %}
  <h2>Accept invitation to {{ invitation.org_name }}</h2>
  <p>You&rsquo;re being added as a <strong>{{ invitation.role }}</strong>.</p>
  {% if form_error %}<p style="color:#a00;">{{ form_error }}</p>{% endif %}
  <form method="post" action="{{ url_for('invitations.accept_post') }}">
    <input type="hidden" name="token" value="{{ token }}">
    <p>
      <label>Username<br>
        <input name="username" required minlength="3" maxlength="32"
               pattern="[A-Za-z0-9_\-]+" autocomplete="username" autofocus>
      </label>
    </p>
    <p>
      <label>Password (12+ chars, not in our common-password list)<br>
        <input name="password" type="password" required minlength="12"
               autocomplete="new-password">
      </label>
    </p>
    <p><button type="submit">Create account</button></p>
  </form>
{% endif %}
</body></html>
