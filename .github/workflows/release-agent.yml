name: release-agent
on:
  push:
    tags:
      - 'agent-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: ""
            label: windows
          # macos-latest = Apple Silicon (arm64). We build a universal2
          # fat binary that runs on BOTH Apple Silicon and Intel by using
          # python.org's universal2 Python installer (actions/setup-python
          # ships an arm64-only build on macos-latest, which can't target
          # universal2). GitHub-hosted Intel Mac runners (macos-13) moved
          # to the paid Larger Runners SKU in early 2026.
          - os: macos-latest
            arch: universal
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install universal2 Python (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          # python.org ships a universal2 .pkg; setup-python does not.
          # 3.11.9 is the last 3.11 release with a binary installer —
          # 3.11.10+ went source-only when 3.11 entered security-fix mode.
          set -euxo pipefail
          PY_VER="3.11.9"
          curl -fL -o /tmp/python.pkg \
            "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          BIN="/Library/Frameworks/Python.framework/Versions/3.11/bin"
          "$BIN/python3.11" --version
          # Confirm both arch slices are present in the interpreter — if
          # PyInstaller's --target-arch universal2 step later fails with a
          # cryptic message, this is usually why.
          file "$BIN/python3.11"
          # python.org's .pkg ships python3.11 and pip3.11 only; the
          # downstream steps use bare `python` and `pip`, so symlink them.
          # (actions/setup-python normally creates these aliases — we
          # bypass it here to get a universal2 build.)
          sudo ln -sf "$BIN/python3.11" "$BIN/python"
          sudo ln -sf "$BIN/pip3.11" "$BIN/pip"
          echo "$BIN" >> $GITHUB_PATH
      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # On macOS we're targeting universal2 — that requires EVERY
          # C-extension wheel to itself be universal2 (PyInstaller raises
          # IncompatibleBinaryArchError otherwise). pip's default install
          # picks the running runner's arch (arm64) so we force the right
          # tag explicitly for the C-extension deps. Pure-Python deps come
          # via the normal requirements install below.
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            python -m pip install --upgrade --force-reinstall \
              --platform macosx_11_0_universal2 \
              --only-binary=:all: \
              --target "/Library/Frameworks/Python.framework/Versions/3.11/lib/python3.11/site-packages" \
              cffi cryptography
          fi
          pip install -r agent/requirements.txt
          pip install pyinstaller
          if [[ "${{ runner.os }}" != "macOS" ]]; then
            pip install cryptography
          fi
          # Sanity check on macOS: every .so under site-packages must be fat.
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            python -c "import cffi, cryptography; print('cffi', cffi.__file__); print('cryptography', cryptography.__file__)"
            find /Library/Frameworks/Python.framework/Versions/3.11/lib/python3.11/site-packages \
              -name '*.so' -exec sh -c 'file "$1" | grep -q "Mach-O universal" || { echo "NOT UNIVERSAL: $1"; file "$1"; exit 1; }' _ {} \; || echo "(non-universal .so found above — may break universal2 PyInstaller build)"
          fi
      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#agent-v}" >> "$GITHUB_OUTPUT"
      - name: Build + sign
        env:
          AGENT_RELEASE_PRIVATE_KEY: ${{ secrets.AGENT_RELEASE_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            python scripts/build_agent.py --version "${{ steps.ver.outputs.version }}" --arch "${{ matrix.arch }}" > build-info.json
          else
            python scripts/build_agent.py --version "${{ steps.ver.outputs.version }}" > build-info.json
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.label }}
          path: |
            dist/dld-agent-*
            build-info.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    # softprops/action-gh-release needs write access to create the Release.
    # The SCP-to-VPS step doesn't need it but inherits the permissions block.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Assemble manifest.json
        run: |
          python - <<'PY'
          import json, os, glob, shutil
          builds = {}
          os.makedirs("release-payload", exist_ok=True)
          for d in glob.glob("artifacts/agent-*"):
              info = json.load(open(os.path.join(d, "build-info.json")))
              info["url"] = f"https://autoalert.pro/agent/releases/{info['filename']}"
              builds[info["platform"]] = info
              # actions/upload-artifact preserves the dist/ prefix, so the
              # binaries land at artifacts/agent-<os>/dist/dld-agent-* —
              # recurse with ** to find them.
              for b in glob.glob(os.path.join(d, "**", "dld-agent-*"), recursive=True):
                  shutil.move(b, os.path.join("release-payload", os.path.basename(b)))
          version = os.environ["GITHUB_REF_NAME"].removeprefix("agent-v")
          manifest = {"version": version, "builds": builds}
          with open("release-payload/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          PY
      # SCP to VPS runs FIRST because it's the critical path — the agent's
      # auto-update reads only from autoalert.pro. The GitHub Release publish
      # below is purely human-convenience; if it fails (e.g. permission drift),
      # continue-on-error keeps the workflow green so the agent fleet still
      # gets the update.
      - name: SCP to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_ed25519 release-payload/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/dld-releases/
      - name: Publish GitHub Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "agent ${{ github.ref_name }} — see docs/release-runbook.md for details"
          files: release-payload/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
