<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Daily Life Distributor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='8' y='12' width='84' height='76' rx='16' fill='%23215fd6' opacity='.18'/><path d='M28 34h44M28 50h30M28 66h18' stroke='%23215fd6' stroke-width='8' stroke-linecap='round'/><circle cx='74' cy='66' r='9' fill='%23215fd6'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --shell-bg: oklch(0.985 0.003 80);
      --panel: oklch(1 0 0);
      --sunken: oklch(0.965 0.004 80);
      --border: oklch(0.91 0.005 80);
      --border-strong: oklch(0.83 0.006 80);
      --text: oklch(0.22 0.012 250);
      --text-muted: oklch(0.5 0.012 250);
      --text-dim: oklch(0.65 0.008 250);
      --accent: oklch(0.58 0.15 245);
      --accent-hover: oklch(0.64 0.16 245);
      --accent-soft: oklch(0.58 0.15 245 / 0.12);
      --err: oklch(0.55 0.20 25);
      --err-soft: oklch(0.65 0.20 25 / 0.14);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 50% -10%, var(--accent-soft), transparent 60%),
        oklch(0.96 0.004 80);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: 0 1px 2px rgba(15,22,35,.04), 0 12px 32px rgba(15,22,35,.06), 0 32px 80px rgba(15,22,35,.08);
      padding: 32px 30px 28px;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--accent); color: #fff;
      display: grid; place-items: center; flex-shrink: 0;
      box-shadow: 0 4px 14px var(--accent-soft);
    }
    .brand-title { font-weight: 600; font-size: 15px; line-height: 1.15; letter-spacing: -0.01em; }
    .brand-sub {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
    }
    h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.012em; margin-bottom: 4px; }
    .lede { color: var(--text-muted); font-size: 0.86rem; margin-bottom: 22px; }
    label { display: block; font-weight: 500; font-size: 0.82rem; margin-bottom: 6px; }
    input[type="password"],
    input[type="text"] {
      width: 100%; padding: 10px 12px;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: var(--radius-md);
      font: inherit; font-size: 0.9rem; outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type="password"]:focus,
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    input::placeholder { color: var(--text-dim); }
    button {
      width: 100%; margin-top: 18px; padding: 11px;
      background: var(--accent); color: #fff;
      border: 1px solid var(--accent); border-radius: var(--radius-md);
      font: inherit; font-weight: 600; font-size: 0.92rem; cursor: pointer;
      transition: background .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s, transform .1s;
    }
    button:hover { background: var(--accent-hover); box-shadow: 0 4px 14px var(--accent-soft); }
    button:active { transform: scale(0.99); }
    .error {
      display: flex; align-items: center; gap: 8px;
      background: var(--err-soft); color: var(--err);
      border: 1px solid transparent; border-left: 3px solid var(--err);
      padding: 10px 12px; border-radius: var(--radius-md);
      font-size: 0.84rem; margin-bottom: 18px;
    }
    .foot { margin-top: 20px; text-align: center; color: var(--text-dim); font-size: 0.72rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="18" rx="4" fill="currentColor" opacity=".25"/>
          <path d="M7 8h10M7 12h7M7 16h4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="18" cy="16" r="2.2" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Daily Life</div>
        <div class="brand-sub">Distributor</div>
      </div>
    </div>

    <h1>Sign in</h1>
    {% if legacy_enabled %}
    <p class="lede">Enter the shared password to access the uploader.</p>
    <form method="POST" action="{{ url_for('auth.login_submit', next=request.args.get('next', '')) }}">
      {% if error %}
      <div class="error" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="••••••••••">
      <button type="submit">Sign in</button>
    </form>
    {% else %}
    <p class="lede">Sign in with your username and password.</p>
    <form method="POST" action="{{ url_for('auth.login_submit', next=request.args.get('next', '')) }}">
      {% if error %}
      <div class="error" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus autocomplete="username" placeholder="alice">
      <label for="password" style="margin-top:12px;">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••••">
      <button type="submit">Sign in</button>
    </form>
    {% endif %}

    <div class="foot">&copy; 2026 Daily Life Distributor</div>
  </div>
</body>
</html>
