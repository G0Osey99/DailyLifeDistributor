# Full hosted stack for the Daily Life uploader (autoalert.pro).
#
#   Cloudflare Tunnel (TLS at the edge) ─▶ caddy ─▶ app (Flask 8080)
#                                                 └▶ app websockify (6080) ─▶ x11vnc
#   ollama ──▶ LLM title suggestions
#
# x11vnc itself is started per-login-session by the app (core/vnc.py), so it's
# not a service here. Cloudflare's public-hostname route (autoalert.pro →
# http://dld-caddy:80) is configured in the Zero-Trust dashboard, keyed to the
# tunnel TUNNEL_TOKEN below.
#
# Secrets live in deploy/.env (NOT committed — see .env.example). Bring up with:
#   cd deploy && docker compose up -d --build
name: dld

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks: [dld-net]

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: dld:latest
    container_name: dld
    restart: unless-stopped
    env_file: .env            # SECRET_ENC_KEY, INITIAL_ADMIN_PASSWORD, ALLOWED_HOSTS
    environment:
      HOSTED: "true"
      DISPLAY: ":99"
      DLD_STATE_DB: /data/state.db
      # Transient media-upload temp dirs share the dld-data volume so the
      # free-space precheck is meaningful and orphans are swept on the volume.
      DLD_UPLOAD_TMP: /data/uploads
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: llama3.2
      # Enables the agent relay + pairing routes (Phase 1+2a of the hybrid
      # upload agent). With this off, the app is byte-for-byte the web-only
      # flow. Confirm wss survives Cloudflare Tunnel + Caddy before flipping.
      HYBRID_AGENT_ENABLED: "true"
    volumes:
      - dld-data:/data
      - ~/dld-releases:/data/releases:ro
    networks: [dld-net]
    depends_on: [ollama]
    # Container-level health: poll the app's /health probe (db + LLM + Chrome).
    # The Host header must match ALLOWED_HOSTS or the DNS-rebind guard 403s it.
    # This surfaces health in `docker ps`; compose does not auto-restart on
    # unhealthy, so an LLM blip flagging 503 is informational, not disruptive.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request as u, sys;
          u.urlopen(u.Request('http://127.0.0.1:8080/health',
          headers={'Host': 'autoalert.pro'}), timeout=5)
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  caddy:
    image: caddy:2
    container_name: dld-caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks: [dld-net]
    depends_on: [app]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dld-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in deploy/.env}
    networks: [dld-net]
    depends_on: [caddy]

networks:
  dld-net:
    name: dld-net

volumes:
  # Named to match the volumes created during the initial docker-run rollout so
  # the encrypted store/sessions (dld-data) and pulled models (ollama-models)
  # are preserved across the switch to compose.
  dld-data:
    name: dld-data
  ollama-models:
    name: ollama-models
  caddy-data:
    name: dld-caddy-data
