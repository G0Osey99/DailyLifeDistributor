<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Two-factor authentication — Daily Life Distributor</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
      --panel: oklch(1 0 0);
      --border: oklch(0.91 0.005 80);
      --border-strong: oklch(0.83 0.006 80);
      --text: oklch(0.22 0.012 250);
      --text-muted: oklch(0.5 0.012 250);
      --accent: oklch(0.58 0.15 245);
      --accent-hover: oklch(0.64 0.16 245);
      --accent-soft: oklch(0.58 0.15 245 / 0.12);
      --err: oklch(0.55 0.20 25);
      --err-soft: oklch(0.65 0.20 25 / 0.14);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family:var(--font-sans); color:var(--text);
      background:
        radial-gradient(1100px 600px at 50% -10%, var(--accent-soft), transparent 60%),
        oklch(0.96 0.004 80);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .card {
      width:100%; max-width:400px;
      background:var(--panel); border:1px solid var(--border);
      border-radius:16px; padding:32px 30px 28px;
      box-shadow: 0 1px 2px rgba(15,22,35,.04), 0 12px 32px rgba(15,22,35,.06), 0 32px 80px rgba(15,22,35,.08);
    }
    h1 { font-size:1.2rem; font-weight:600; letter-spacing:-0.012em; margin-bottom:4px; }
    .lede { color:var(--text-muted); font-size:0.86rem; margin-bottom:22px; }
    label { display:block; font-weight:500; font-size:0.82rem; margin-bottom:6px; }
    input[name="code"] {
      width:100%; padding:14px 16px;
      background:var(--panel); color:var(--text);
      border:1px solid var(--border-strong); border-radius:8px;
      font:inherit; font-family:var(--font-mono); font-size:1.1rem;
      letter-spacing:0.25em; text-align:center;
      outline:none; transition:border-color .15s, box-shadow .15s;
    }
    input[name="code"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    button {
      width:100%; margin-top:18px; padding:11px;
      background:var(--accent); color:#fff;
      border:1px solid var(--accent); border-radius:8px;
      font:inherit; font-weight:600; font-size:0.92rem; cursor:pointer;
      transition:background .18s;
    }
    button:hover { background:var(--accent-hover); }
    .error {
      background:var(--err-soft); color:var(--err);
      border-left:3px solid var(--err);
      padding:10px 12px; border-radius:8px;
      font-size:0.84rem; margin-bottom:14px;
    }
    .hint {
      font-size:0.78rem; color:var(--text-muted);
      margin-top:14px; text-align:center;
    }
    .hint a { color:var(--accent); }
    .hint a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Two-factor authentication</h1>
    <p class="lede">Enter the 6-digit code from your authenticator app, or one of your recovery codes.</p>
    {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/login/2fa">
      <input type="hidden" name="tok" value="{{ tok }}">
      <label for="code">Verification code</label>
      <input id="code" name="code" required autofocus autocomplete="one-time-code" inputmode="numeric" placeholder="• • • • • •">
      <button type="submit">Continue</button>
    </form>
    <p class="hint">Lost your device and recovery codes? <a href="/recover">Start account recovery</a>.</p>
  </div>
</body>
</html>
