name: release-agent
on:
  push:
    tags:
      - 'agent-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: ""
            label: windows
          # macos-latest = Apple Silicon (arm64). macos-13 still has the
          # last Intel runner image GitHub ships. Both produce *separate*
          # binaries; the download landing page surfaces both Mac options.
          - os: macos-latest
            arch: arm64
            label: macos-arm64
          - os: macos-13
            arch: intel
            label: macos-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install pyinstaller cryptography
      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#agent-v}" >> "$GITHUB_OUTPUT"
      - name: Build + sign
        env:
          AGENT_RELEASE_PRIVATE_KEY: ${{ secrets.AGENT_RELEASE_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            python scripts/build_agent.py --version "${{ steps.ver.outputs.version }}" --arch "${{ matrix.arch }}" > build-info.json
          else
            python scripts/build_agent.py --version "${{ steps.ver.outputs.version }}" > build-info.json
          fi
      - uses: actions/upload-artifact@v4
        with:
          # Use the matrix.label, not matrix.os, so two macos artifacts don't
          # collide on the same artifact name (macos-13 vs macos-latest).
          name: agent-${{ matrix.label }}
          path: |
            dist/dld-agent-*
            build-info.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    # softprops/action-gh-release needs write access to create the Release.
    # The SCP-to-VPS step doesn't need it but inherits the permissions block.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Assemble manifest.json
        run: |
          python - <<'PY'
          import json, os, glob, shutil
          builds = {}
          os.makedirs("release-payload", exist_ok=True)
          for d in glob.glob("artifacts/agent-*"):
              info = json.load(open(os.path.join(d, "build-info.json")))
              info["url"] = f"https://autoalert.pro/agent/releases/{info['filename']}"
              builds[info["platform"]] = info
              # actions/upload-artifact preserves the dist/ prefix, so the
              # binaries land at artifacts/agent-<os>/dist/dld-agent-* —
              # recurse with ** to find them.
              for b in glob.glob(os.path.join(d, "**", "dld-agent-*"), recursive=True):
                  shutil.move(b, os.path.join("release-payload", os.path.basename(b)))
          version = os.environ["GITHUB_REF_NAME"].removeprefix("agent-v")
          manifest = {"version": version, "builds": builds}
          with open("release-payload/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          PY
      # SCP to VPS runs FIRST because it's the critical path — the agent's
      # auto-update reads only from autoalert.pro. The GitHub Release publish
      # below is purely human-convenience; if it fails (e.g. permission drift),
      # continue-on-error keeps the workflow green so the agent fleet still
      # gets the update.
      - name: SCP to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_ed25519 release-payload/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/dld-releases/
      - name: Publish GitHub Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "agent ${{ github.ref_name }} — see docs/release-runbook.md for details"
          files: release-payload/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
