<!DOCTYPE html>
<html lang="en">
<head>

    <!--
    noVNC example: lightweight example using minimal UI and features

    This is a self-contained file which doesn't import WebUtil or external CSS.

    Copyright (C) 2019 The noVNC Authors
    noVNC is licensed under the MPL 2.0 (see LICENSE.txt)
    This file is licensed under the 2-Clause BSD license (see LICENSE.txt).

    Connect parameters are provided in query string:
        http://example.com/?host=HOST&port=PORT&scale=true
    -->
    <title>noVNC</title>

    <style>

        body {
            margin: 0;
            background-color: dimgrey;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        html {
            height: 100%;
        }

        #top_bar {
            background-color: #6e84a3;
            color: white;
            font: bold 12px Helvetica;
            padding: 6px 5px 4px 5px;
            border-bottom: 1px outset;
        }
        #status {
            text-align: center;
        }
        #sendCtrlAltDelButton {
            position: fixed;
            top: 0px;
            right: 0px;
            border: 1px outset;
            padding: 5px 5px 4px 5px;
            cursor: pointer;
        }

        #screen {
            flex: 1; /* fill remaining space */
            overflow: hidden;
        }

    </style>

    <script type="module" crossorigin="anonymous">
        // RFB holds the API to connect and communicate with a VNC server
        import RFB from './core/rfb.js';

        let rfb;
        let desktopName;
        let _reconnects = 0;
        const MAX_RECONNECTS = 30;

        // When this function is called we have
        // successfully connected to a server
        function connectedToServer(e) {
            _reconnects = 0;
            status("Connected to " + desktopName);
            startKeepAlive();
        }

        // This function is called when we are disconnected. Cloudflare closes
        // idle proxied WebSockets (~100s) and a static VNC screen sends no
        // traffic, so reconnect automatically — the remote browser session
        // persists, so this just re-attaches the view.
        function disconnectedFromServer(e) {
            stopKeepAlive();
            if (e.detail.clean) {
                status("Disconnected");
            } else if (_reconnects < MAX_RECONNECTS) {
                _reconnects++;
                status("Reconnecting…");
                setTimeout(connect, 1200);
            } else {
                status("Connection lost — reload to retry.");
            }
        }

        // When this function is called, the server requires
        // credentials to authenticate
        function credentialsAreRequired(e) {
            const password = prompt("Password Required:");
            rfb.sendCredentials({ password: password });
        }

        // When this function is called we have received
        // a desktop name from the server
        function updateDesktopName(e) {
            desktopName = e.detail.name;
        }

        // Since most operating systems will catch Ctrl+Alt+Del
        // before they get a chance to be intercepted by the browser,
        // we provide a way to emulate this key sequence.
        function sendCtrlAltDel() {
            rfb.sendCtrlAltDel();
            return false;
        }

        // Show a status text in the top bar
        function status(text) {
            document.getElementById('status').textContent = text;
        }

        // This function extracts the value of one variable from the
        // query string. If the variable isn't defined in the URL
        // it returns the default value instead.
        function readQueryVariable(name, defaultValue) {
            // A URL with a query parameter can look like this:
            // https://www.example.com?myqueryparam=myvalue
            //
            // Note that we use location.href instead of location.search
            // because Firefox < 53 has a bug w.r.t location.search
            const re = new RegExp('.*[?&]' + name + '=([^&#]*)'),
                  match = document.location.href.match(re);

            if (match) {
                // We have to decode the URL since want the cleartext value
                return decodeURIComponent(match[1]);
            }

            return defaultValue;
        }

        document.getElementById('sendCtrlAltDelButton')
            .onclick = sendCtrlAltDel;

        // Read parameters specified in the URL query string
        // By default, use the host and port of server that served this file
        const host = readQueryVariable('host', window.location.hostname);
        let port = readQueryVariable('port', window.location.port);
        const password = readQueryVariable('password');
        const path = readQueryVariable('path', 'websockify');

        // | | |         | | |
        // | | | Connect | | |
        // v v v         v v v

        // Build the websocket URL used to connect
        function buildUrl() {
            let url = (window.location.protocol === "https:") ? 'wss' : 'ws';
            url += '://' + host;
            if (port) { url += ':' + port; }
            url += '/' + path;
            return url;
        }

        // (Re)connect. Called on first load and after an unexpected disconnect.
        function connect() {
            status("Connecting");
            rfb = new RFB(document.getElementById('screen'), buildUrl(),
                          { credentials: { password: password } });
            rfb.addEventListener("connect",  connectedToServer);
            rfb.addEventListener("disconnect", disconnectedFromServer);
            rfb.addEventListener("credentialsrequired", credentialsAreRequired);
            rfb.addEventListener("desktopname", updateDesktopName);
            rfb.viewOnly = readQueryVariable('view_only', false);
            rfb.scaleViewport = readQueryVariable('scale', false);
        }

        // ── Keep-alive ─────────────────────────────────────────────────────
        // Cloudflare closes proxied WebSockets after ~100s of silence; a static
        // remote screen sends nothing. Nudge a (no-button) cursor move every
        // 50s so the socket keeps flowing. Tracks the last touch/scroll point
        // so the nudge doesn't visibly jump the cursor.
        let _kaTimer = null, _kaTick = 0;
        let _lastPos = null;   // {x, y} in client coords
        function startKeepAlive() {
            stopKeepAlive();
            _kaTimer = setInterval(() => {
                const canvas = document.getElementById('screen').querySelector('canvas');
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const p = _lastPos || { x: rect.left + 3, y: rect.top + 3 };
                _kaTick = (_kaTick + 1) % 2;   // 1px jitter so noVNC emits the move
                canvas.dispatchEvent(new MouseEvent('mousemove', {
                    clientX: p.x + _kaTick, clientY: p.y, bubbles: true,
                }));
            }, 50000);
        }
        function stopKeepAlive() { if (_kaTimer) { clearInterval(_kaTimer); _kaTimer = null; } }

        connect();

        // ── Seamless clipboard paste (local → remote) ──────────────────────
        // A paste gesture — Ctrl/Cmd+V, right-click → Paste, or a mobile
        // long-press → Paste — all fire a browser 'paste' event. We sync the
        // local clipboard onto the remote VNC clipboard, then issue the remote
        // paste shortcut. The remote is Linux/Chrome, so paste there is always
        // Ctrl+V regardless of the local OS. No buttons, works on touch too.
        let _lastPaste = 0;
        function remotePaste(text) {
            if (!text || !rfb) return;
            if (Date.now() - _lastPaste < 300) return;   // dedupe paste-event vs keydown fallback
            _lastPaste = Date.now();
            rfb.clipboardPasteFrom(text);
            // Let the ClientCutText land (x11vnc takes the X selection) before
            // the paste keystroke.
            setTimeout(() => {
                const CTRL = 0xffe3, V = 0x0076;          // XK_Control_L, XK_v
                rfb.sendKey(CTRL, "ControlLeft", true);
                rfb.sendKey(V, "KeyV", true);
                rfb.sendKey(V, "KeyV", false);
                rfb.sendKey(CTRL, "ControlLeft", false);
            }, 80);
        }

        // Universal hook: fires for Cmd/Ctrl+V, right-click paste, and mobile
        // paste, with the data available synchronously (no permission prompt).
        document.addEventListener('paste', (e) => {
            const cd = e.clipboardData || window.clipboardData;
            const text = cd ? cd.getData('text') : '';
            if (text) { e.preventDefault(); e.stopImmediatePropagation(); remotePaste(text); }
        }, true);

        // Stop noVNC forwarding the raw Ctrl/Cmd+V (which would paste the stale
        // remote clipboard and double up), and cover browsers that don't emit a
        // 'paste' event here by reading the clipboard via the async API.
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
                e.preventDefault();
                e.stopImmediatePropagation();
                if (navigator.clipboard && navigator.clipboard.readText) {
                    setTimeout(() => {
                        if (Date.now() - _lastPaste > 250) {   // 'paste' event didn't handle it
                            navigator.clipboard.readText().then(remotePaste).catch(() => {});
                        }
                    }, 100);
                }
            }
        }, true);

        // ── Nicer one-finger scrolling on touch (mobile) ───────────────────
        // noVNC maps a one-finger drag to a remote mouse-drag, so scrolling a
        // page inside the remote browser otherwise needs an awkward two-finger
        // gesture. Intercept the single-finger 'drag' gesture (in the capture
        // phase, before noVNC's own handler on the canvas) and turn it into
        // remote wheel scrolling. Taps (→ click), two-finger drag, long-press
        // (→ right-click) and pinch are left to noVNC untouched. Desktop/mouse
        // never emits these gestures, so it's unaffected.
        const SCROLL_SENS = 2;     // wheel delta per px of finger travel; tunable
        const WHEEL_STEP = 50;     // == noVNC's WHEEL_STEP (px per discrete step)
        const screenEl = document.getElementById('screen');
        let _dragLastX = null, _dragLastY = null;     // last finger position
        let _accX = 0, _accY = 0, _scrollRAF = null;  // accumulated, un-emitted delta

        // Emit whole wheel steps for the accumulated delta, on each axis,
        // carrying the remainder forward. noVNC emits at most one step per axis
        // per wheel event, so we dispatch one event per step rather than a
        // single large delta (which would be truncated and under-scroll).
        function flushScroll() {
            _scrollRAF = null;
            const canvas = screenEl.querySelector('canvas');
            if (!canvas) { _accX = _accY = 0; return; }
            let guard = 0;
            while ((Math.abs(_accX) >= WHEEL_STEP || Math.abs(_accY) >= WHEEL_STEP) && guard++ < 200) {
                const dX = Math.abs(_accX) >= WHEEL_STEP ? (_accX > 0 ? WHEEL_STEP : -WHEEL_STEP) : 0;
                const dY = Math.abs(_accY) >= WHEEL_STEP ? (_accY > 0 ? WHEEL_STEP : -WHEEL_STEP) : 0;
                canvas.dispatchEvent(new WheelEvent('wheel', {
                    deltaX: dX, deltaY: dY, deltaMode: 0,
                    clientX: _dragLastX || 0, clientY: _dragLastY || 0,
                    bubbles: true, cancelable: true,
                }));
                _accX -= dX; _accY -= dY;
            }
        }

        function handleDragScroll(e) {
            if (!e.detail || e.detail.type !== 'drag') return;   // single-finger drag only
            e.stopImmediatePropagation();                        // suppress noVNC mouse-drag
            if (e.type === 'gestureend') {
                if (_scrollRAF) { cancelAnimationFrame(_scrollRAF); _scrollRAF = null; }
                flushScroll();
                _dragLastX = _dragLastY = null;
                return;
            }
            if (e.type === 'gesturestart' || _dragLastY === null) {
                _dragLastX = e.detail.clientX;
                _dragLastY = e.detail.clientY;
                _lastPos = { x: e.detail.clientX, y: e.detail.clientY };
                return;
            }
            _accX += (_dragLastX - e.detail.clientX) * SCROLL_SENS;   // swipe left → scroll left
            _accY += (_dragLastY - e.detail.clientY) * SCROLL_SENS;   // swipe up → scroll up
            _dragLastX = e.detail.clientX;
            _dragLastY = e.detail.clientY;
            _lastPos = { x: e.detail.clientX, y: e.detail.clientY };  // feed keep-alive
            if (!_scrollRAF) _scrollRAF = requestAnimationFrame(flushScroll);
        }
        screenEl.addEventListener('gesturestart', handleDragScroll, true);
        screenEl.addEventListener('gesturemove', handleDragScroll, true);
        screenEl.addEventListener('gestureend', handleDragScroll, true);
    </script>
</head>

<body>
    <div id="top_bar">
        <div id="status">Loading</div>
        <div id="sendCtrlAltDelButton">Send CtrlAltDel</div>
    </div>
    <div id="screen">
        <!-- This is where the remote screen will appear -->
    </div>
</body>
</html>
