# Media folders and the planning spreadsheet are picked per browser session on
# the dashboard now (browser-streaming pipeline) — no server-side directories
# or spreadsheet path, and the column mapping lives in the Flask session.
scheduling:
  timezone: America/New_York
  youtube_video: 03:00
  youtube_shorts: '14:00'
  simplecast: 00:00
  vista_social: 07:00
platforms:
  youtube_video: true
  youtube_shorts: true
  simplecast: true
  rock: false
  rock_email: false
  vista_social: false
youtube:
  default_category_id: '22'
  default_privacy: private
  made_for_kids: false
  daily_quota: 10000
simplecast:
  default_season: 1
  explicit: false
upload:
  max_workers: 4
  # Per-platform circuit breaker. After this many consecutive infra failures
  # (broken/expired session, network, unresponsive page) the platform is
  # skipped for the rest of the run instead of relaunching Chrome and burning
  # the login timeout on every remaining date. It re-probes after the cooldown.
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout_seconds: 120
llm:
  model: llama3.2
  num_title_suggestions: 3
  backend: llamafile
  port: 8081
defaults:
  elements:
    yt_video_enabled: true
    yt_video_thumbnail: true
    yt_video_title: true
    yt_video_description: true
    yt_video_tags: true
    yt_video_schedule: true
    yt_shorts_enabled: true
    yt_shorts_thumbnail: true
    yt_shorts_title: true
    yt_shorts_description: true
    yt_shorts_tags: true
    yt_shorts_schedule: true
    sc_enabled: true
    sc_thumbnail: true
    sc_description: true
    sc_schedule: true
    rock_enabled: true
    rock_spotlight: true
    rock_vista: true
    rock_reflection: true
    rock_image: true
    rock_email_enabled: true
    rock_email_thumbnail: true
    vs_enabled: true
    vs_description: true
    vs_schedule: true
