[pytest]
# agent/tests was OMITTED here — requirements-dev.txt's comment ("agent
# deps, needed so the agent/ tests run in CI") shows the intent, but
# `python -m pytest -q` only collects testpaths, so none of agent/tests
# ever gated CI. tests/ stays first; agent/tests/conftest.py restores the
# core.db / core.secrets_store shims its dispatch tests install so the two
# suites can't poison each other in either order.
testpaths = tests agent/tests
addopts = -ra -q --strict-markers
markers =
    integration: requires real platform credentials/sessions; skipped without them
# Fail loudly with a traceback when a single test hangs > 60s — historically
# CI on Linux has sat silent for 10+ minutes when a relay/server fixture
# leaked between tests. `thread` works on every platform (signal-based
# timeouts don't, on Windows).
timeout = 60
timeout_method = thread
